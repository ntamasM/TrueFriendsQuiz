server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index app.html;

    # Landing page (Coolify root)
    location = / {
        try_files /app.html =404;
    }

    location = /index.html {
        try_files /app.html =404;
    }

    # Everything else (game files, assets, bundles) served normally
    location / {
        try_files $uri $uri/ =404;
    }
}
