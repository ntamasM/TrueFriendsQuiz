server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve app pages (index, about) from the app/ directory
    location = / {
        try_files /app/index.html =404;
    }

    location = /index.html {
        try_files /app/index.html =404;
    }

    location = /about.html {
        try_files /app/about.html =404;
    }

    location = /about {
        try_files /app/about.html =404;
    }

    # Serve app CSS and JS from app/ subdirectories
    location /app/ {
        try_files $uri =404;
    }

    # Everything else (game files, assets, languages) served normally
    location / {
        try_files $uri $uri/ =404;
    }
}
